# ── Practice account — MNQ — SuperTrend v1 ───────────────────────────
# Required credentials (filled in by setup.sh)
account:    ""
username:   ""
apikey:     ""

# Contract
contract:   "CON.F.US.MNQ.M26"

# Strategy
strategy:   "supertrend"
model:      "models/st_trend_v1.onnx"

# Risk
risk_amount:          200
max_contracts:        5
high_conf_multiplier: 1.0

# Entry filters
