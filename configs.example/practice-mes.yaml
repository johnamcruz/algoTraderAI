# ── Practice account — MES — VWAP v1 ─────────────────────────────────
# Required credentials (filled in by setup.sh)
account:    ""
username:   ""
apikey:     ""

# Contract
contract:   "CON.F.US.MES.M26"

# Strategy
strategy:   "vwap"
model:      "models/vwap_v1.onnx"

# Risk
risk_amount:          200
max_contracts:        5
high_conf_multiplier: 1.0

# Entry filters
entry_conf:         0.70
min_risk_rr:        4.0
min_vty_regime:     0.75
min_entry_distance: 3.0

# Stop sizing
min_stop_pts: 1.0
min_stop_atr: 0.5

# Session limits
profit_target: 12000
max_loss:      3000

# Behaviour
breakeven_on_2r:      false
enable_trailing_stop: false
